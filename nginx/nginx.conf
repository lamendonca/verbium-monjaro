# server block do Mounjaro (montado em /etc/nginx/conf.d/default.conf)
server {
    # Porta alta: container roda não-root (cap_drop ALL). Ver docker-compose.yml.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # env.js é gerado em runtime pelo entrypoint (envsubst) em /tmp/env.js.
    # Contém SUPABASE_URL/ANON_KEY/APP_TOKEN — nunca cachear, nunca commitar.
    location = /env.js {
        alias /tmp/env.js;
        default_type application/javascript;
        add_header Cache-Control "no-store";
    }

    # no-cache = revalidar sempre (ETag). Evita mistura de módulos JS de
    # versões diferentes no browser após cada atualização do app.
    location ~ \.(js|css|html)$ {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    # App de página única: tudo cai no index.html (sem router server-side).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
