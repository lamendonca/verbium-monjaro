# Mounjaro — nginx servindo o app estático + injeção de env no boot.
# Estado vive no Supabase; container é descartável (sem volumes persistentes).
services:
  web:
    image: nginx:alpine
    env_file: .env
    # Reexporta para o envsubst do entrypoint (gera app/env.js -> /tmp/env.js)
    environment:
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - APP_TOKEN
      - ENV
    # Não-root (cap_drop ALL impede chown/bind :80) — porta alta interna,
    # conforme security.md → container hardening.
    user: "101:101"
    ports:
      - "8080:8080"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/generate-env.sh:/docker-entrypoint.d/40-generate-env.sh:ro
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # uid/gid 101 = usuário nginx (container roda não-root)
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
